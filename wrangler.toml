# Cloudflare Workers 部署配置
# 使用 cloudflare/python-workers 运行时

name = "jhun-ai-lab"
main = "worker.py"
compatibility_date = "2025-07-01"

# Python Workers 绑定
[[d1_databases]]
binding = "DB"
database_name = "jhun-lab-db"
database_id = ""

# 如果需要自定义域名
routes = [
  { pattern = "ai-lab.jhun.example.com", custom_domain = true }
]

[env.production]
vars = { ENVIRONMENT = "production" }
